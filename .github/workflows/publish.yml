name: "Release on npm owon"
on:
  push:
    branches:
      - main

jobs:
  release:
    name: npm-publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        registry-url: https://registry.npmjs.org
    - name: Strip _authToken from .npmrc so npm 10 falls through to OIDC exchange
      run: echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
    - run: npm ci
    - run: npm run dist
    - run: npm run dev
    - run: npm test
    - run: npm publish --provenance --access public
