name: "Release on npm owon"
on:
  push:
    branches:
      - main

jobs:
  release:
    name: npm-publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
    - name: Configure npm for trusted publishing (no token)
      run: |
        npm config set registry https://registry.npmjs.org/
        npm config set //registry.npmjs.org/:_authToken ""
        echo "--- npm version ---"
        npm --version
        echo "--- npm config ---"
        npm config list
        echo "--- .npmrc ---"
        cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc)"
        echo "--- OIDC env ---"
        echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+set}"
    - run: npm ci
    - run: npm run dist
    - run: npm run dev
    - run: npm test
    - run: npm publish --provenance --access public --loglevel verbose
